services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.qdrant.rule=Host(`${QDRANT_DOMAIN}`)
      - traefik.http.routers.qdrant.entrypoints=websecure
      - traefik.http.routers.qdrant.tls.certresolver=letsencrypt
      - traefik.http.routers.qdrant.middlewares=qdrant-auth
      - traefik.http.middlewares.qdrant-auth.basicauth.users=${TRAEFIK_AUTH}
      - traefik.http.services.qdrant.loadbalancer.server.port=6333
    networks:
      - traefik
      - mindajo

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    profiles:
      - graph
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
    volumes:
      - neo4j-data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - traefik.enable=true
      - traefik.http.routers.neo4j.rule=Host(`${NEO4J_DOMAIN}`)
      - traefik.http.routers.neo4j.entrypoints=websecure
      - traefik.http.routers.neo4j.tls.certresolver=letsencrypt
      - traefik.http.routers.neo4j.middlewares=neo4j-auth
      - traefik.http.middlewares.neo4j-auth.basicauth.users=${TRAEFIK_AUTH}
      - traefik.http.services.neo4j.loadbalancer.server.port=7474
    networks:
      - traefik
      - mindajo

volumes:
  qdrant-data:
  neo4j-data:

networks:
  traefik:
    external: true
  mindajo:
