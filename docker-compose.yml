# MindOJO Docker Compose
#
# Usage:
#   docker compose up                     — traefik + mindojo (Ollama on remote host via OLLAMA_HOST)
#   docker compose --profile gpu up       — traefik + mindojo + ollama + open-webui
#   Set COMPOSE_PROFILES=gpu in .env to enable Ollama by default.

services:
  traefik:
    image: traefik:v3.3.6
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=ollama_traefik"
      - "--providers.docker.constraints=Label(`traefik.instance`,`ollama`)"
      - "--entrypoints.ollama.address=:11434"
      - "--entrypoints.webui.address=:11400"
      - "--entrypoints.mindojo.address=:8190"
      - "--experimental.plugins.traefik-api-token-middleware.modulename=github.com/Aetherinox/traefik-api-token-middleware"
      - "--experimental.plugins.traefik-api-token-middleware.version=v0.1.4"
    network_mode: host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  mindojo:
    build: .
    environment:
      LANCEDB_PATH: /data/lancedb
      HF_HOME: /data/fastembed
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-ollama::qwen3.5:9b}
      MINDOJO_API_KEY: ${MINDOJO_API_KEY}
      MINDOJO_LOG_FILE: ""
      MINDOJO_LISTEN: 0.0.0.0:8191
      DISTILL_MEMORIES: ${DISTILL_MEMORIES:-true}
      EMBED_MODEL: ${EMBED_MODEL:-MultilingualE5Large}
    volumes:
      - mindojo-data:/data/lancedb
      - mindojo-models:/data/fastembed
    networks:
      - traefik
      - backend
    # No ports: mapping — mindojo is NOT directly accessible from host.
    # External access is only through Traefik (:8190).
    labels:
      - "traefik.instance=ollama"
      - "traefik.enable=true"
      - "traefik.http.routers.mindojo.rule=PathPrefix(`/`)"
      - "traefik.http.routers.mindojo.entrypoints=mindojo"
      - "traefik.http.services.mindojo.loadbalancer.server.port=8191"
      - "traefik.http.middlewares.mindojo-ipallow.ipallowlist.sourcerange=127.0.0.1/32,::1/128,10.29.0.0/16"
      - "traefik.http.middlewares.mindojo-auth.plugin.traefik-api-token-middleware.authenticationheader=false"
      - "traefik.http.middlewares.mindojo-auth.plugin.traefik-api-token-middleware.bearerheader=true"
      - "traefik.http.middlewares.mindojo-auth.plugin.traefik-api-token-middleware.bearerheadername=Authorization"
      - "traefik.http.middlewares.mindojo-auth.plugin.traefik-api-token-middleware.tokens=${MINDOJO_API_KEY}"
      - "traefik.http.middlewares.mindojo-auth.plugin.traefik-api-token-middleware.removeheadersonsuccess=true"
      - "traefik.http.routers.mindojo.middlewares=mindojo-ipallow@docker,mindojo-auth@docker"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8191/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  ollama:
    image: ollama/ollama:0.6.2
    profiles: ["gpu"]
    runtime: nvidia
    environment:
      OLLAMA_CONTEXT_LENGTH: 196608
      OLLAMA_KEEP_ALIVE: 60m
      OLLAMA_KV_CACHE_TYPE: q8_0
      # Max concurrent requests per model (default: 1)
      OLLAMA_NUM_PARALLEL: 1
      # Max queued requests before rejecting (default: 512)
      OLLAMA_MAX_QUEUE: 60
    volumes:
      - ${OLLAMA_DATA_DIR:-ollama-data}:/root/.ollama
    networks:
      - traefik
      - backend
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    labels:
      - "traefik.instance=ollama"
      - "traefik.enable=true"
      - "traefik.http.routers.ollama.rule=PathPrefix(`/`)"
      - "traefik.http.routers.ollama.entrypoints=ollama"
      - "traefik.http.services.ollama.loadbalancer.server.port=11434"
      # Middlewares: IP allowlist + bearer token auth (both required)
      - "traefik.http.middlewares.ollama-ipallow.ipallowlist.sourcerange=127.0.0.1/32,::1/128,10.29.0.0/16"
      - "traefik.http.middlewares.ollama-auth.plugin.traefik-api-token-middleware.authenticationheader=false"
      - "traefik.http.middlewares.ollama-auth.plugin.traefik-api-token-middleware.bearerheader=true"
      - "traefik.http.middlewares.ollama-auth.plugin.traefik-api-token-middleware.bearerheadername=Authorization"
      - "traefik.http.middlewares.ollama-auth.plugin.traefik-api-token-middleware.tokens=${OLLAMA_API_KEY}"
      - "traefik.http.middlewares.ollama-auth.plugin.traefik-api-token-middleware.removeheadersonsuccess=true"
      - "traefik.http.routers.ollama.middlewares=ollama-ipallow@docker,ollama-auth@docker"
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    profiles: ["gpu"]
    volumes:
      - open-webui:/app/backend/data
    environment:
      # Direct backend access, bypasses Traefik auth
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama
    networks:
      - traefik
      - backend
    labels:
      - "traefik.instance=ollama"
      - "traefik.enable=true"
      - "traefik.http.routers.webui.rule=PathPrefix(`/`)"
      - "traefik.http.routers.webui.entrypoints=webui"
      - "traefik.http.services.webui.loadbalancer.server.port=8080"
      # IP allowlist only (open-webui handles its own auth)
      - "traefik.http.middlewares.webui-ipallow.ipallowlist.sourcerange=127.0.0.1/32,::1/128,10.29.0.0/16"
      - "traefik.http.routers.webui.middlewares=webui-ipallow@docker"
    restart: unless-stopped

networks:
  traefik:
    name: ollama_traefik
  backend:
    internal: true

volumes:
  open-webui:
  mindojo-data:
  mindojo-models:
