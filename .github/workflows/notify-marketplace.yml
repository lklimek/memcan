name: Notify Marketplace

on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/plugin.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger marketplace workflow
        run: |
          gh workflow run --repo lklimek/agents update.yml
        env:
          # AGENTS_PAT must have either the `actions:write` scope (recommended) or the `repo` scope
          # so that `gh workflow run` can trigger workflows in the lklimek/agents repository.
          GH_TOKEN: ${{ secrets.AGENTS_PAT }}
