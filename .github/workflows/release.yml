name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
            features: ""
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            suffix: ""
            features: "vendored-openssl"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
            features: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ""
            features: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""
            features: ""

    steps:
      # INTENTIONAL(SEC-011): Version tags used instead of commit SHAs — accepted risk for readability
      - uses: actions/checkout@v4
      # INTENTIONAL(SEC-011): Version tags used instead of commit SHAs — accepted risk for readability
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Ubuntu dependencies
        if: runner.os == 'Linux'
        run: bash scripts/setup-ubuntu.sh

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      # INTENTIONAL(SEC-011): Version tags used instead of commit SHAs — accepted risk for readability
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features && format('--features {0}', matrix.features) || '' }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package binaries
        run: |
          for bin in memcan-server memcan; do
            if [ -f "target/${{ matrix.target }}/release/${bin}${{ matrix.suffix }}" ]; then
              mkdir -p "dist-${bin}"
              cp "target/${{ matrix.target }}/release/${bin}${{ matrix.suffix }}" "dist-${bin}/"
              tar czf "${bin}-${{ matrix.target }}.tar.gz" -C "dist-${bin}" .
              sha256sum "${bin}-${{ matrix.target }}.tar.gz" > "${bin}-${{ matrix.target }}.tar.gz.sha256"
            fi
          done

      # INTENTIONAL(SEC-011): Version tags used instead of commit SHAs — accepted risk for readability
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            memcan-server-${{ matrix.target }}.tar.gz
            memcan-server-${{ matrix.target }}.tar.gz.sha256
            memcan-${{ matrix.target }}.tar.gz
            memcan-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # INTENTIONAL(SEC-011): Version tags used instead of commit SHAs — accepted risk for readability
      - uses: actions/checkout@v4

      # INTENTIONAL(SEC-011): Version tags used instead of commit SHAs — accepted risk for readability
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect checksums
        run: |
          cat artifacts/**/*.sha256 > artifacts/SHA256SUMS

      # INTENTIONAL(SEC-011): Version tags used instead of commit SHAs — accepted risk for readability
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/SHA256SUMS
          generate_release_notes: true
