# Publish the `memcan` crate to crates.io on version tags.
# Runs CI checks first (check, test, clippy, fmt), then publishes if all pass.
name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      # INTENTIONAL(SEC-011): Version tags used instead of commit SHAs — accepted risk for readability
      - uses: actions/checkout@v4
      - name: Install Ubuntu dependencies
        run: bash scripts/setup-ubuntu.sh
      # INTENTIONAL(SEC-011): Version tags used instead of commit SHAs — accepted risk for readability
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      # INTENTIONAL(SEC-011): Version tags used instead of commit SHAs — accepted risk for readability
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo check --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  publish:
    name: Publish memcan
    needs: ci
    runs-on: ubuntu-latest
    environment: crates-io
    concurrency:
      group: crates-io-publish
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      # Pinned to commit SHA — this job handles a secret (CARGO_REGISTRY_TOKEN).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install Ubuntu dependencies
        run: bash scripts/setup-ubuntu.sh
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish -p memcan --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
