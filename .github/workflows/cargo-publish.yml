# Publish the `memcan` crate to crates.io on GitHub release.
# Reuses CI workflow for checks, then publishes if all pass.
name: Publish to crates.io

on:
  release:
    types: [published]

concurrency:
  group: cargo-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish memcan
    needs: ci
    runs-on: ubuntu-latest
    environment: crates-io
    concurrency:
      group: crates-io-publish
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      # Pinned to commit SHA — this job handles a secret (CARGO_REGISTRY_TOKEN).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install Ubuntu dependencies
        run: bash scripts/setup-ubuntu.sh
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish -p memcan --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
